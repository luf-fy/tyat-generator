<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyat Generator</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f4f4f9; 
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #1a73e8; margin-bottom: 1rem; }
        p { color: #555; margin-bottom: 1.5rem; }
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px;
            transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        #output { 
            margin-top: 25px; 
            font-weight: bold; 
            color: #333; 
            line-height: 1.6; 
            min-height: 50px;
            padding: 10px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tyat Generator 🤣</h1>
        <p>एउटा नयाँ प्रहसन (Tyat) पाउन तलको बटन थिच्नुहोस्:</p>
        <button onclick="generateTyat()">Generate Tyat</button>
        <div id="output">बटन थिचेपछि यहाँ जोक्स आउनेछ...</div>
    </div>

    <script>
        async function generateTyat() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerText = "सोच्दै छु... 🤔";
            
            // तपाईंको असली API Key यहाँ हालिएको छ
            const apiKey = "AIzaSyB123_EXAMPLE_KEY_DO_NOT_LEAK"; 

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: "Write a very short, funny, and unique Nepali joke (Tyat) in Nepali language. Just give the joke text." }] 
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const joke = data.candidates[0].content.parts[0].text;
                    outputDiv.innerText = joke;
                } else {
                    outputDiv.innerText = "केही गडबड भयो। फेरि प्रयास गर्नुहोस्!";
                }

            } catch (error) {
                outputDiv.innerText = "नेटवर्कमा समस्या आयो। कृपया इन्टरनेट चेक गर्नुहोस्!";
                console.error("Error:", error);
            }
        }
    </script>

</body>
</html>

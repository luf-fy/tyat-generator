<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyat Generator</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h1 { color: #1a73e8; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background-color: #1557b0; }
        #output { margin-top: 20px; font-weight: bold; color: #333; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tyat Generator 🤣</h1>
    <p>एउटा नयाँ प्रहसन (Tyat) पाउन तलको बटन थिच्नुहोस्:</p>
    <button onclick="generateTyat()">Generate Tyat</button>
    <div id="output">बटन थिचेपछि यहाँ जोक्स आउनेछ...</div>
</div>

<script>
    async function generateTyat() {
        const outputDiv = document.getElementById('output');
        outputDiv.innerText = "सोच्दै छु... 🤔";

        // नोट: यो कोडले .env बाट API Key लिन्छ (Vite प्रयोग गर्दा)
        const apiKey = import.meta.env.VITE_GEMINI_API_KEY; 

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Write a short, funny Nepali joke (Tyat)." }] }]
                })
            });

            const data = await response.json();
            const joke = data.candidates[0].content.parts[0].text;
            outputDiv.innerText = joke;
        } catch (error) {
            outputDiv.innerText = "केही गडबड भयो। कृपया फेरि प्रयास गर्नुहोस्।";
            console.error(error);
        }
    }
</script>

</body>
</html>
